<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Feedler</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-row">
          <div>
            <div class="brand">Feedler</div>
            <div class="brand-subtitle" id="syncStatus">Starting</div>
          </div>
          <button class="icon-button" id="shortcutButton" title="Keyboard shortcuts">?</button>
        </div>

        <div class="sidebar-actions">
          <button id="addFeedButton">Add Feed</button>
          <button id="settingsButton">Settings</button>
        </div>

        <button class="scope-row active" data-scope="all" data-id="0" id="allScope">
          <span>All Articles</span>
          <span class="count" id="allUnread">0</span>
        </button>

        <div class="tree" id="feedTree"></div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1 id="scopeTitle">All Articles</h1>
            <div class="scope-meta" id="scopeMeta">No articles loaded</div>
          </div>
          <div class="topbar-actions">
            <div class="segmented" role="group" aria-label="Filter articles">
              <button class="active" id="filterUnread" data-filter="unread">Unread</button>
              <button id="filterAll" data-filter="all">All</button>
            </div>
            <button id="refreshButton">Refresh</button>
            <button id="markAllButton">Mark Read</button>
            <button id="exportButton">Export</button>
          </div>
        </header>

        <section class="reader">
          <div class="list-panel">
            <div class="list-toolbar">
              <input id="searchInput" type="search" placeholder="Search articles" autocomplete="off" />
              <span id="itemCount">0</span>
            </div>
            <div class="item-list" id="itemList" tabindex="0"></div>
          </div>

          <article class="article-panel" id="articlePanel">
            <div class="empty-state">Select an article</div>
          </article>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" hidden></div>
    <div class="modal-backdrop" id="modalBackdrop" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-header">
          <h2 id="modalTitle"></h2>
          <button class="icon-button" id="modalClose" title="Close">x</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
