services:
  feedler:
    build: .
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DATA_DIR: "/data"
      WEB_DIR: "/app/web"
      OPML_PATH: "/app/Feeds.opml"
      TZ: "Europe/Berlin"
    volumes:
      - feedler-data:/data
    restart: unless-stopped

volumes:
  feedler-data:
